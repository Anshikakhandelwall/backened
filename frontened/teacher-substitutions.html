<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Substitutions</title>
  <link rel="stylesheet" href="teacher-substitutions.css">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1c3557">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SmartTimetable">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>

<body>

  <div class="container">

    <div class="sidebar">
      <div>
        <div class="logo">🎓
          <div>
            <h3>SmartTimetable</h3>
            <p>Alert System</p>
          </div>
        </div>
        <div class="profile">
          <div class="avatar" id="avatarLetter">T</div>
          <div>
            <h4 id="teacherName">Teacher</h4>
            <span class="role">Teacher</span>
          </div>
        </div>
        <ul class="menu">
          <li><a href="teacher-dashboard.html">Dashboard</a></li>
          <li><a href="teacher-timetable.html">My Timetable</a></li>
          <li><a href="teacher-mark-lecture.html">Mark Lecture</a></li>
          <li class="active"><a href="teacher-substitutions.html">Substitutions</a></li>
          <li><a href="teacher-events.html">Events</a></li>
          <li><a href="changepassword.html">Change Password</a></li>
        </ul>
      </div>
      <div class="logout">
        <a href="#" onclick="handleLogout()">Sign Out</a>
      </div>
    </div>

    <div class="main">
      <div class="header">
        <div>
          <h2>Substitutions</h2>
          <p class="subtitle">Your substitution history</p>
        </div>
        <span id="date"></span>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('covering', this)">
          Covering For Others
        </button>
        <button class="tab" onclick="switchTab('absent', this)">
          My Absences
        </button>
      </div>

      <div id="subList">
        <p style="color:#6b7280">Loading substitutions...</p>
      </div>
    </div>
  </div>

  <script type="module">
    const BASE_URL = 'http://localhost:5000/api';
    const token = localStorage.getItem('accessToken');
    const userName = localStorage.getItem('userName') || 'Teacher';

    if (!token || localStorage.getItem('userRole') !== 'teacher') {
      window.location.href = 'signin.html';
    }

    window.handleLogout = async () => {
      await fetch(`${BASE_URL}/auth/logout`, { method: 'POST', credentials: 'include' });
      localStorage.clear(); window.location.href = 'signin.html';
    };

    const avatarEl = document.getElementById('avatarLetter');
    const nameEl = document.getElementById('teacherName');
    if (avatarEl) avatarEl.textContent = userName.charAt(0).toUpperCase();
    if (nameEl) nameEl.textContent = userName;

    const now = new Date();
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const dateEl = document.getElementById('date');
    if (dateEl)
      dateEl.textContent =
        `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

    let allData = { covering: [], absent: [] };

    // ── Tab switch ─────────────────────────────────────────────────────────
    window.switchTab = (type, btn) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderSubs(allData[type], type);
    };

    // ── Render substitutions ───────────────────────────────────────────────
    const renderSubs = (subs, type) => {
      const container = document.getElementById('subList');

      if (!subs.length) {
        container.innerHTML = `
        <div class="empty-state">
          <h3>No records found</h3>
          <p>${type === 'covering'
            ? 'You have not covered any classes yet.'
            : 'No absences recorded.'}</p>
        </div>`;
        return;
      }

      container.innerHTML = subs.map(s => {
        const d = new Date(s.sub_date);
        const dateStr = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

        return `
        <div class="sub-card ${type}">
          <div class="sub-header">
            <div>
              <h4>${s.subject_name}</h4>
              <p>${s.section_name} &nbsp;|&nbsp; ${s.room || 'TBD'}</p>
            </div>
            <span class="sub-badge ${type === 'covering'
            ? 'badge-covering' : 'badge-absent'}">
              ${type === 'covering' ? 'Covering' : 'Absent'}
            </span>
          </div>
          <div class="sub-details">
            <span>📅 ${dateStr}</span>
            <span>⏰ ${s.start_time} – ${s.end_time}</span>
            <span>${type === 'covering'
            ? '👤 Original: ' + s.original_teacher
            : '👤 Covered by: ' + s.substitute_teacher}</span>
            ${s.reason ? `<span>📝 ${s.reason}</span>` : ''}
          </div>
        </div>`;
      }).join('');
    };

    // ── Fetch substitutions ────────────────────────────────────────────────
    const fetchSubs = async () => {
      try {
        const res = await fetch(`${BASE_URL}/substitutions/teacher`, {
          headers: { 'Authorization': `Bearer ${token}` },
          credentials: 'include',
        });
        const data = await res.json();

        if (data.success) {
          allData = {
            covering: data.data.covering || [],
            absent: data.data.absent || [],
          };
        } else {
          allData = { covering: [], absent: [] };
        }

      } catch (err) {
        console.error('Fetch substitutions error:', err);
        allData = { covering: [], absent: [] };
      }

      renderSubs(allData.covering, 'covering');
    };

    fetchSubs();
  </script>
</body>

</html>
